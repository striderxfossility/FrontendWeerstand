apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weerstandnatuursteen-frontend
  labels:
    app: weerstandnatuursteen-frontend
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/server-snippet: |
      gzip on;
      gzip_vary on;
      gzip_proxied any;
      gzip_comp_level 5;
      gzip_min_length 1024;
      gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    nginx.ingress.kubernetes.io/configuration-snippet: |
      set $skip_cache 0;
      set $is_static 0;

      if ($uri ~* "\.(css|js|jpg|jpeg|png|gif|webp|avif|svg|ico|woff|woff2|ttf|eot)$") { set $is_static 1; }
      if ($request_method != GET) { set $skip_cache 1; }
      if ($query_string != "") { set $skip_cache 1; }
      if ($http_cookie ~* "laravel_session|XSRF-TOKEN|remember_web") { set $skip_cache 1; }
      if ($http_authorization != "") { set $skip_cache 1; }
      if ($is_static = 1) { set $skip_cache 0; }

      proxy_cache wp_cache;
      proxy_cache_key "$scheme$request_method$host$request_uri";
      proxy_cache_valid 200 301 10m;
      proxy_cache_valid any 1m;
      proxy_cache_lock on;
      proxy_cache_revalidate on;
      proxy_cache_background_update on;
      proxy_cache_use_stale updating error timeout invalid_header http_500 http_502 http_503 http_504;
      proxy_cache_bypass $skip_cache;
      proxy_no_cache $skip_cache;
      proxy_ignore_headers Cache-Control Expires Set-Cookie;
      add_header X-Cache-Status $upstream_cache_status always;
      add_header X-Cache-Debug "skip=$skip_cache static=$is_static" always;
spec:
  ingressClassName: ${INGRESS_CLASS}
  tls:
    - hosts:
        - weerstandnatuursteen.nl
        - www.weerstandnatuursteen.nl
        - backend.weerstandnatuursteen.nl
        - www.backend.weerstandnatuursteen.nl
      secretName: ${INGRESS_TLS_SECRET}
  rules:
    - host: weerstandnatuursteen.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weerstandnatuursteen-frontend
                port:
                  number: 80
    - host: www.weerstandnatuursteen.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weerstandnatuursteen-frontend
                port:
                  number: 80
    - host: backend.weerstandnatuursteen.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weerstandnatuursteen-backend
                port:
                  number: 80
    - host: www.backend.weerstandnatuursteen.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weerstandnatuursteen-backend
                port:
                  number: 80
